{{- if .Values.ctrl.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "reshapr-ctrl.serviceAccountName" . }}-role
rules:
  - apiGroups: [""]
    resources: ["pods", "endpoints", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "reshapr-ctrl.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reshapr-ctrl.labels" . | nindent 4 }}
  {{- with .Values.ctrl.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "reshapr-ctrl.serviceAccountName" . }}-role
subjects:
  - kind: ServiceAccount
    name: {{ include "reshapr-ctrl.serviceAccountName" . }}
roleRef:
  kind: Role
  name: {{ include "reshapr-ctrl.serviceAccountName" . }}-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
