apiVersion: v1
kind: Service
metadata:
  name: {{ include "reshapr-ctrl.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reshapr-ctrl.labels" . | nindent 4 }}
spec:
  type: {{ .Values.ctrl.service.type }}
  ports:
    - port: {{ .Values.ctrl.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "reshapr-ctrl.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "reshapr-ctrl.fullname" . }}-hz
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reshapr-ctrl.labels" . | nindent 4 }}
spec:
  type: {{ .Values.ctrl.service.type }}
  ports:
    - port: 5556
      targetPort: hazelcast
      protocol: TCP
      name: hazelcast
  selector:
    {{- include "reshapr-ctrl.selectorLabels" . | nindent 4 }}
