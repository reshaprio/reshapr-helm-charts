{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "reshapr-ctrl-plane.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reshapr-ctrl-plane.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.ctrl.enabled }}
    {{- if .Values.ingress.ctrl.host }}
    - host: {{ .Values.ingress.ctrl.host | quote }}
      http:
        paths:
          {{- range .Values.ingress.ctrl.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "reshapr-ctrl.fullname" $ }}
                port:
                  number: {{ $.Values.ctrl.service.port }}
          {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
