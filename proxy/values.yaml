# Default values for reshapr-proxy
# This is a YAML-formatted file.

# -- Global image pull secrets
imagePullSecrets:
  #- name: ghcr-secret

# -- Override the name of the chart
nameOverride: ""
# -- Override the full name of the release
fullnameOverride: ""

# =============================================================================
# Proxy configuration
# =============================================================================

# -- Number of proxy replicas
replicaCount: 1

image:
  # -- Image repository for reshapr-proxy
  repository: quay.io/reshapr/reshapr-proxy
  # -- Image tag for reshapr-proxy
  tag: "nightly"
  # -- Image pull policy
  pullPolicy: Always

# -- Service account configuration
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# -- Pod annotations
podAnnotations: {}

# -- Pod labels
podLabels: {}

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Service configuration
service:
  type: ClusterIP
  port: 7777
  targetPort: 7777
  annotations: {}

# -- Resources limits and requests
resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# -- Health check configuration
healthCheck:
  # -- Enable liveness probe
  livenessProbe:
    enabled: true
    httpGet:
      path: /q/health/live
      port: http2
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  # -- Enable readiness probe
  readinessProbe:
    enabled: true
    httpGet:
      path: /q/health/ready
      port: http2
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity configuration
affinity: {}

# -- Pod Disruption Budget configuration
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# =============================================================================
# Gateway specific configuration
# =============================================================================

gateway:
  # -- Gateway ID prefix (will be combined with pod name for uniqueness)
  # Final ID will be: {idPrefix}-{podName}
  # If empty, only pod name is used
  idPrefix: ""

  # -- Gateway FQDNs (comma-separated list)
  fqdns: ""

  # -- Gateway labels (semi-colon separated key=value pairs)
  labels: "env=dev;team=reshapr"

  # -- Control plane configuration
  controlPlane:
    # -- Control plane host
    host: "reshapr-control-plane-ctrl"
    # -- Control plane port
    port: 5555
    # -- Control plane plain text mode over TLS (true is not recommended for production)
    tlsPlainText: true
    # -- Control plane token (deprecated - use existingSecret instead)
    token: ""
    # -- Use existing secret for control plane token
    existingSecret: ""
    # -- Key in the existing secret for token
    tokenKey: "token"

# -- Extra environment variables
extraEnv: []
# - name: CUSTOM_VAR
#   value: "custom-value"

# -- Extra volume mounts
extraVolumeMounts: []

# -- Extra volumes
extraVolumes: []

# =============================================================================
# Autoscaling configuration
# =============================================================================

autoscaling:
  # -- Enable horizontal pod autoscaler
  enabled: false
  # -- Minimum number of replicas
  minReplicas: 1
  # -- Maximum number of replicas
  maxReplicas: 10
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # -- Target memory utilization percentage
  # targetMemoryUtilizationPercentage: 80

# =============================================================================
# Ingress configuration
# =============================================================================

ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    # cert-manager.io/cluster-issuer: letsencrypt-prod

  # -- Ingress hosts configuration
  hosts:
    - host: mcp.reshapr.example.com
      paths:
        - path: /
          pathType: Prefix

  # -- TLS configuration
  tls: []
  #  - secretName: reshapr-proxy-tls
  #    hosts:
  #      - mcp.reshapr.example.com

# =============================================================================
# Service Monitor for Prometheus (optional)
# =============================================================================

serviceMonitor:
  # -- Enable ServiceMonitor for Prometheus
  enabled: false
  # -- Additional labels for ServiceMonitor
  additionalLabels: {}
  # -- Scrape interval
  interval: 30s
  # -- Scrape timeout
  scrapeTimeout: 10s
