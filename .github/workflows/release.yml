name: release
on:
  push:
    tags:
      - '*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      deployments: write
      id-token: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Install cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

      - name: Set up JDK 21 for x64
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Extract tag version
        id: get_version
        run: echo "version=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      - name: Login to Quay OCI registry
        run: |
          helm registry login quay.io -u ${{ secrets.QUAY_USERNAME }} -p ${{ secrets.QUAY_PASSWORD }}
          cosign login quay.io -u ${{ secrets.QUAY_USERNAME }} -p ${{ secrets.QUAY_PASSWORD }}

      - name: Package control-plane chart
        run: |
          helm package ./control-plane --version ${{ steps.get_version.outputs.version }} --destination ./packaged

      - name: Package proxy chart
        run: |
          helm package ./proxy --version ${{ steps.get_version.outputs.version }} --destination ./packaged

      - name: Push control-plane chart
        id: push_control_plane
        run: |
          OUTPUT=$(helm push ./packaged/control-plane-${{ steps.get_version.outputs.version }}.tgz oci://quay.io/reshapr/reshapr-helm-charts 2>&1)
          echo "$OUTPUT"
          DIGEST=$(echo "$OUTPUT" | grep -oP 'Digest: \K\S+')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Sign control-plane chart
        run: |
          cosign sign --new-bundle-format=false --yes \
            quay.io/reshapr/reshapr-helm-charts/control-plane@${{ steps.push_control_plane.outputs.digest }}

      - name: Push proxy chart
        id: push_proxy
        run: |
          OUTPUT=$(helm push ./packaged/proxy-${{ steps.get_version.outputs.version }}.tgz oci://quay.io/reshapr/reshapr-helm-charts 2>&1)
          echo "$OUTPUT"
          DIGEST=$(echo "$OUTPUT" | grep -oP 'Digest: \K\S+')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Sign proxy chart
        run: |
          cosign sign --new-bundle-format=false --yes \
            quay.io/reshapr/reshapr-helm-charts/proxy@${{ steps.push_proxy.outputs.digest }}

      - name: Create GitHub Release with JReleaser
        uses: jreleaser/release-action@90ac653bb9c79d11179e65d81499f3f34527dcd5 # v 2.5.0
        with:
          arguments: full-release
        env:
          JRELEASER_PROJECT_VERSION: ${{ steps.get_version.outputs.version }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Persist logs
      - name: JReleaser release output
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v 7.0.0
        with:
          name: jreleaser-release
          path: |
            target/jreleaser/trace.log
            target/jreleaser/output.properties