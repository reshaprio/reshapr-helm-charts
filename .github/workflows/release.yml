name: release
on:
  push:
    tags:
      - '*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      deployments: write
      id-token: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}
          fetch-depth: 0
          ref: main

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Set up JDK 21 for x64
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Extract tag version
        id: get_version
        run: echo "version=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      - name: Login to Quay OCI registry
        run: |
          echo ${{ secrets.QUAY_PASSWORD }} | helm registry login quay.io -u ${{ secrets.QUAY_USERNAME }} --password-stdin
          echo ${{ secrets.QUAY_PASSWORD }} | cosign login quay.io -u ${{ secrets.QUAY_USERNAME }} --password-stdin

      - name: Sync chart versions from tag
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          for chart in control-plane proxy web-ui; do
            sed -i "s/^version:.*/version: ${VERSION}/" ./${chart}/Chart.yaml
          done

      - name: Package control-plane chart
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm dependency update ./control-plane
          helm package ./control-plane --version ${{ steps.get_version.outputs.version }} --destination ./packaged

      - name: Package proxy chart
        run: |
          helm package ./proxy --version ${{ steps.get_version.outputs.version }} --destination ./packaged

      - name: Package web-ui chart
        run: |
          helm package ./web-ui --version ${{ steps.get_version.outputs.version }} --destination ./packaged

      - name: Push control-plane chart
        id: push_control_plane
        run: |
          OUTPUT=$(helm push ./packaged/reshapr-control-plane-${{ steps.get_version.outputs.version }}.tgz oci://quay.io/reshapr/reshapr-helm-charts 2>&1)
          echo "$OUTPUT"
          DIGEST=$(echo "$OUTPUT" | grep -oP 'Digest: \K\S+')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Sign control-plane chart
        run: |
          cosign sign --new-bundle-format=false --use-signing-config=false --yes \
            quay.io/reshapr/reshapr-helm-charts/reshapr-control-plane@${{ steps.push_control_plane.outputs.digest }}

      - name: Push proxy chart
        id: push_proxy
        run: |
          OUTPUT=$(helm push ./packaged/reshapr-proxy-${{ steps.get_version.outputs.version }}.tgz oci://quay.io/reshapr/reshapr-helm-charts 2>&1)
          echo "$OUTPUT"
          DIGEST=$(echo "$OUTPUT" | grep -oP 'Digest: \K\S+')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Sign proxy chart
        run: |
          cosign sign --new-bundle-format=false --use-signing-config=false --yes \
            quay.io/reshapr/reshapr-helm-charts/reshapr-proxy@${{ steps.push_proxy.outputs.digest }}

      - name: Push web-ui chart
        id: push_web_ui
        run: |
          OUTPUT=$(helm push ./packaged/reshapr-ui-${{ steps.get_version.outputs.version }}.tgz oci://quay.io/reshapr/reshapr-helm-charts 2>&1)
          echo "$OUTPUT"
          DIGEST=$(echo "$OUTPUT" | grep -oP 'Digest: \K\S+')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT 

      - name: Sign web-ui chart
        run: |
          cosign sign --new-bundle-format=false --use-signing-config=false --yes \
            quay.io/reshapr/reshapr-helm-charts/reshapr-ui@${{ steps.push_web_ui.outputs.digest }}

      - name: Create GitHub Release with JReleaser
        uses: jreleaser/release-action@90ac653bb9c79d11179e65d81499f3f34527dcd5 # v 2.5.0
        with:
          arguments: full-release
        env:
          JRELEASER_PROJECT_VERSION: ${{ steps.get_version.outputs.version }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated chart versions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add control-plane/Chart.yaml control-plane/Chart.lock proxy/Chart.yaml web-ui/Chart.yaml
          git commit -m "chore: sync chart versions to ${VERSION}"
          git push origin main

      # Persist logs
      - name: JReleaser release output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v 7.0.1
        with:
          name: jreleaser-release
          path: |
            target/jreleaser/trace.log
            target/jreleaser/output.properties